{% extends "base.html" %}
{% block title %}Assessment Results — DiabetiCare{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Your Self-Assessment Results</h1>
</div>
<div class="card mb-xl fade-in-up" style="text-align: center; padding: var(--space-2xl); max-width: 600px;">
    <div style="font-size: 4rem;">&#x25CF;
    </div>
    <h2
        style="font-size: var(--font-size-3xl); color: {{ 'var(--success)' if pct >= 80 else ('var(--primary)' if pct >= 60 else ('var(--warning)' if pct >= 40 else 'var(--info)')) }};">
        {{ score }}/{{ max_score }} ({{ pct }}%)
    </h2>
    <p style="font-size: var(--font-size-lg); color: var(--text-secondary); margin-top: var(--space-md);">{{ feedback }}
    </p>
</div>
<div class="d-flex gap-md" style="max-width: 600px;">
    <a href="{{ url_for('assessment.questionnaire') }}" class="btn btn-secondary">Take Again</a>
    <a href="{{ url_for('education.index') }}" class="btn btn-primary">Explore Education</a>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Dashboard</a>
</div>
{% endblock %}
